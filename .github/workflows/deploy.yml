name: Build & Deploy SkorpioGamers to Vercel

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests brotli
      - run: python create_skorpio.py
      - name: Commit site
        run: |
          git config --global user.name "SkorpioBot"
          git config --global user.email "bot@skorpiogamers.site"
          git add site/ site_compressed/
          git commit -m "🔄 Update $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
