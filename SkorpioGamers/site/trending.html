<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Trending – SkorpioGamers</title>
  <meta name="description" content="Giochi più cliccati e seguiti dagli utenti oggi.">
  <link rel="stylesheet" href="/assets/style.css">
  <script>
    async function loadTrending(){
      let res=await fetch("/api/stats");
      let data=await res.json();
      document.getElementById("trend").innerHTML=data.map(([u,c])=>`<li>${u} – ${c} click</li>`).join("");
    }
    window.onload=loadTrending;
  </script>
</head>
<body>
  <h1>📈 Giochi in Tendenza</h1>
  <ul id="trend"></ul>
  <footer>Ultimo update automatico</footer>
</body>
</html>
